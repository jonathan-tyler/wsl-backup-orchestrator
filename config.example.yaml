# Copy to ~/.config/wsl-backup/config.yaml (WSL/Linux)
# or %APPDATA%\wsl-backup\config.yaml (Windows).
#
# This sample is used by the installer scaffold and as a starting point.
# Daily runs can execute backups when config is present and valid.
# Rules are read from the config directory using:
# - Include files: includes.daily.txt, includes.weekly.txt, includes.monthly.txt
# - Exclude file: excludes.txt (single shared file)

restic_version: "0.18.1"
profiles:
  wsl:
    repositories:
      daily: /path/to/restic-repo-daily
      weekly: /path/to/restic-repo-weekly
      monthly: /path/to/restic-repo-monthly

  windows:
    repositories:
      daily: /mnt/c/path/to/restic-repo-daily
      weekly: /mnt/c/path/to/restic-repo-weekly
      monthly: /mnt/c/path/to/restic-repo-monthly
    use_fs_snapshot: true
    # When enabled, wsl-backup runs through an elevated Windows process (UAC prompt).
